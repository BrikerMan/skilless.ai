name: Release

on:
  push:
    tags:
      - 'release/v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          # release/v2025.01.01 → 2025.01.01
          VERSION="${GITHUB_REF#refs/tags/release/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: echo "${{ steps.version.outputs.VERSION }}" > src/skilless/VERSION

      - name: Build zip
        run: |
          mkdir -p dist
          zip -r dist/skilless.zip . \
            --exclude '*.git*' \
            --exclude 'dist/*' \
            --exclude '*.venv*' \
            --exclude '*__pycache__*' \
            --exclude '*.pyc'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.VERSION }}
          files: dist/skilless.zip
          generate_release_notes: true
          body: |
            ## Upgrade

            To update to this version, simply re-run the install script:

            **macOS / Linux**
            ```sh
            curl -fsSL https://skilless.ai/install | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://skilless.ai/install.ps1 | iex
            ```