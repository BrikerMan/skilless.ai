name: Release

on:
  push:
    tags:
      - 'release/v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          # release/v2025.01.01 → 2025.01.01
          VERSION="${GITHUB_REF#refs/tags/release/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: echo "${{ steps.version.outputs.VERSION }}" > src/skilless/VERSION

      - name: Create distribution directory
        run: mkdir -p dist

      - name: Build package
        run: |
          mkdir -p package/src/skilless/scripts
          mkdir -p package/src/skilless.ai-brainstorming
          mkdir -p package/src/skilless.ai-research
          mkdir -p package/src/skilless.ai-writing

          cp pyproject.toml package/
          cp README.md package/
          cp src/skilless/VERSION package/src/skilless/
          cp src/skilless/__init__.py package/src/skilless/
          cp src/skilless/SKILL.md package/src/skilless/
          cp -r src/skilless/scripts/*.py package/src/skilless/scripts/
          cp src/skilless.ai-brainstorming/SKILL.md package/src/skilless.ai-brainstorming/
          cp src/skilless.ai-research/SKILL.md package/src/skilless.ai-research/
          cp src/skilless.ai-writing/SKILL.md package/src/skilless.ai-writing/

          cd package
          zip -r ../dist/skilless.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.VERSION }}
          files: dist/skilless.zip
          generate_release_notes: true